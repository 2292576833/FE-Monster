    <link rel="stylesheet" href="/components/GlassSurface.css?v=20260701-main-blue-orb" />

  <body>
    <section class="boot-screen" id="bootScreen" aria-label="FE moster launch screen">

    <div class="app-shell">
      <form

        id="topSearchForm"
        role="search"
        aria-label="鎼滅储闊充箰"

        data-glass-radius="16"
        data-glass-brightness="58"
        data-glass-opacity="0.92"
        data-glass-blur="11"
        data-glass-displace="0.44"
        data-glass-background-opacity="0.14"
        data-glass-saturation="1.22"
        data-glass-distortion-scale="-168"
        data-glass-red-offset="-6"
        data-glass-green-offset="50"
        data-glass-blue-offset="50"

      <button
        class="netease-login-button glass-surface glass-surface--fallback"
        id="neteaseLoginButton"
        type="button"
        aria-haspopup="dialog"
        aria-controls="neteaseLoginDialog"
        data-glass-surface
        data-glass-radius="16"
        data-glass-brightness="62"
        data-glass-opacity="0.9"
        data-glass-blur="12"
        data-glass-displace="0.36"
        data-glass-background-opacity="0.16"
        data-glass-saturation="1.16"
        data-glass-distortion-scale="-158"
        data-glass-red-offset="-4"
        data-glass-green-offset="18"
        data-glass-blue-offset="32"

        <span class="glass-surface__content">
          <span class="netease-login-mark" aria-hidden="true"></span>
          <span class="netease-login-label" id="neteaseLoginLabel">缃戞槗浜戠櫥褰?/span>

      <button
        class="home-button glass-surface glass-surface--fallback"
        id="homeButton"
        type="button"
        aria-label="鍥炲埌绮掑瓙鐞冧富椤甸潰"

        data-glass-radius="23"
        data-glass-brightness="66"
        data-glass-opacity="0.88"
        data-glass-blur="13"
        data-glass-displace="0.34"
        data-glass-background-opacity="0.18"
        data-glass-saturation="1.18"
        data-glass-distortion-scale="-156"
        data-glass-red-offset="-4"
        data-glass-green-offset="20"
        data-glass-blue-offset="36"

      <button

        id="diyButton"
        type="button"
        aria-label="Open DIY panel"
        aria-controls="diySidebar"
        aria-expanded="false"
        data-glass-surface
        data-glass-radius="23"
        data-glass-brightness="66"
        data-glass-opacity="0.88"
        data-glass-blur="13"
        data-glass-displace="0.34"
        data-glass-background-opacity="0.18"
        data-glass-saturation="1.18"
        data-glass-distortion-scale="-156"
        data-glass-red-offset="-4"
        data-glass-green-offset="20"
        data-glass-blue-offset="36"
      >
        <span class="glass-surface__content">DIY</span>
      </button>

      <main class="stage" aria-label="鐧借壊绮掑瓙鐞冩挱鏀捐垶鍙?>
        <canvas id="orbCanvas" aria-hidden="true"></canvas>
        <div class="stage-glow" aria-hidden="true"></div>
        <section class="dynamic-cube-scene" id="dynamicCubeScene" aria-label="鍔ㄦ劅榄旀柟" hidden>
          <div class="dynamic-cube-rig" id="dynamicCubeRig" aria-hidden="true">

          </div>
        </section>
        <section class="playback-lyric-scene" id="playbackLyricScene" aria-label="3D playback lyric" hidden>
          <div class="playback-lyric-rig" id="playbackLyricRig" aria-live="polite">
            <div class="playback-lyric-core" id="playbackLyricCore">
              <span class="playback-lyric-layer lyric-depth-5" id="playbackLyricDepth5"></span>
              <span class="playback-lyric-layer lyric-depth-4" id="playbackLyricDepth4"></span>
              <span class="playback-lyric-layer lyric-depth-3" id="playbackLyricDepth3"></span>
              <span class="playback-lyric-layer lyric-depth-2" id="playbackLyricDepth2"></span>
              <span class="playback-lyric-layer lyric-depth-1" id="playbackLyricDepth1"></span>
              <span class="playback-lyric-layer lyric-depth-0" id="playbackLyricText"></span>
              <span class="playback-lyric-layer lyric-back" id="playbackLyricBack"></span>
            </div>
            <div class="playback-lyric-subtitle" id="playbackLyricSubtitle"></div>
          </div>
        </section>
        <section class="orb-playlists" id="orbPlaylists" aria-label="缃戞槗浜戠敤鎴锋瓕鍗? hidden>
          <div class="orb-playlist-status" id="orbPlaylistStatus">缃戞槗浜戞瓕鍗?/div>
          <div class="orb-playlist-cards" id="orbPlaylistCards"></div>
        </section>

        <section class="playlist-shelf" id="playlistShelf" aria-label="3D 姝屽崟鏋? hidden>
          <div class="playlist-shelf-stage" id="playlistShelfStage" tabindex="0" role="region" aria-labelledby="playlistShelfTitle">
            <div class="playlist-shelf-panel">
              <header class="playlist-shelf-head">
                <span class="playlist-shelf-cover" id="playlistShelfCover">
                  <img id="playlistShelfCoverImage" alt="" />
                  <span>姝屽崟</span>
                </span>
                <span class="playlist-shelf-copy">
                  <span class="playlist-shelf-kicker">缃戞槗浜戞瓕鍗曟灦</span>
                  <strong id="playlistShelfTitle">閫夋嫨姝屽崟</strong>
                  <small id="playlistShelfMeta">鏈€夋嫨姝屽崟</small>
                </span>
                <button class="playlist-shelf-hide" id="playlistShelfClose" type="button">闅愯棌</button>
              </header>
              <div class="playlist-shelf-scroll" id="playlistShelfScroll">
                <div class="playlist-song-stack" id="playlistSongStack"></div>
              </div>
            </div>
            <div class="playlist-shelf-back" id="playlistShelfBack" role="button" tabindex="0" aria-label="鏄剧ず姝屽崟鏋舵闈?>
              <div class="playlist-shelf-back-content">
                <header class="playlist-shelf-head playlist-shelf-back-head">
                  <span class="playlist-shelf-cover" id="playlistShelfBackCover">
                    <img id="playlistShelfBackCoverImage" alt="" />
                    <span>姝屽崟</span>
                  </span>
                  <span class="playlist-shelf-copy">
                    <span class="playlist-shelf-kicker">BACK SIDE</span>
                    <strong id="playlistShelfBackTitle">閫夋嫨姝屽崟</strong>
                    <small id="playlistShelfBackMeta">鏈€夋嫨姝屽崟</small>
                  </span>

                <div class="playlist-shelf-scroll playlist-shelf-back-scroll" id="playlistShelfBackScroll">
                  <div class="playlist-song-stack playlist-song-stack--back" id="playlistSongStackBack"></div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
      <div id="tsparticles" style="position:fixed;inset:0;z-index:0;pointer-events:none" aria-hidden="true"></div>

      <footer
        class="player-dock glass-surface glass-surface--fallback"
        aria-label="鎾斁鎺у埗鏍?
        data-glass-surface
        data-glass-radius="20"
        data-glass-brightness="54"
        data-glass-opacity="0.94"
        data-glass-blur="12"
        data-glass-displace="0.4"
        data-glass-background-opacity="0.1"
        data-glass-saturation="1.2"
        data-glass-distortion-scale="-174"
        data-glass-red-offset="-6"
        data-glass-green-offset="18"
        data-glass-blue-offset="34"
      >
        <div class="glass-surface__content">
          <div class="dock-track">
            <div class="mini-cover">
              <img id="dockCover" alt="" />
              <span>FE</span>
            </div>
            <div class="track-copy">
              <span class="dock-status" id="dockStatus">READY</span>
              <strong id="dockTitle">鏈挱鏀?/strong>
              <small id="dockArtist">閫夋嫨涓€棣栨瓕寮€濮?/small>
            </div>
          </div>

          <div class="dock-center">
            <div class="transport" aria-label="鎾斁鎺у埗">
              <button class="icon-button transport-prev" id="prevButton" type="button" title="涓婁竴棣? aria-label="涓婁竴棣?>
                <span class="control-icon control-icon-prev" aria-hidden="true"></span>
              </button>
              <button class="icon-button play" id="playButton" type="button" title="鎾斁" aria-label="鎾斁">
                <span class="control-icon control-icon-play" aria-hidden="true"></span>
              </button>
              <button class="icon-button transport-next" id="nextButton" type="button" title="涓嬩竴棣? aria-label="涓嬩竴棣?>
                <span class="control-icon control-icon-next" aria-hidden="true"></span>
              </button>
            </div>

            <div class="progress-area">
              <input id="progressRange" type="range" min="0" max="1000" value="0" aria-label="鎾斁杩涘害" />
              <div class="time-row">
                <span id="currentTime">00:00</span>
                <span id="totalTime">00:00</span>
              </div>
            </div>
          </div>

          <div class="volume-area">
            <span class="volume-icon" aria-hidden="true"></span>
            <span id="volumeLabel">80%</span>
            <input id="volumeRange" type="range" min="0" max="100" value="80" aria-label="闊抽噺" />
          </div>
        </div>

      <aside class="diy-sidebar" id="diySidebar" aria-label="DIY playback preset" aria-hidden="true">
        <div class="diy-sidebar-head">
          <span>DIY</span>
          <button class="diy-close-button" id="diyCloseButton" type="button" aria-label="Close DIY panel"></button>
        </div>
        <button class="diy-preset-button glass-surface glass-surface--fallback" id="diyPresetButton" type="button" aria-expanded="true" aria-controls="diyPresetPage" data-glass-surface>
          <span class="glass-surface__content">棰勮</span>
        </button>
        <section class="diy-preset-page is-expanded" id="diyPresetPage" aria-label="棰勮椤?>

            <button class="diy-preset-card is-active" id="diyLyricPreset" type="button" data-preset="lyric">
              <strong>3D姝岃瘝</strong>
              <small>灏侀潰鍙栬壊</small>
            </button>
            <button class="diy-preset-card" id="diyCubePreset" type="button" data-preset="cube">
              <strong>鍔ㄦ劅榄旀柟</strong>
              <small>浣庨椹卞姩</small>
            </button>
          </div>
          <div class="diy-spectrum">
            <span>浣庨</span>
            <div class="diy-spectrum-track" aria-hidden="true">
              <i id="spectrumBassFill"></i>

          </div>
          <div class="diy-control">
            <label for="lyricBrightnessRange">姝岃瘝浜害</label>
            <input id="lyricBrightnessRange" type="range" min="60" max="180" value="112" />
            <span id="lyricBrightnessValue">112%</span>
          </div>
          <div class="diy-control">
            <label for="lyricSpeedRange">璺冲姩閫熷害</label>
            <input id="lyricSpeedRange" type="range" min="60" max="180" value="100" />
            <span id="lyricSpeedValue">100%</span>
          </div>
          <div class="diy-control">
            <label for="cubeIntensityRange">榄旀柟寮哄害</label>
            <input id="cubeIntensityRange" type="range" min="40" max="180" value="110" />
            <span id="cubeIntensityValue">110%</span>
          </div>
        </section>
      </aside>

    <div class="netease-login-dialog" id="neteaseLoginDialog" role="dialog" aria-modal="true" aria-labelledby="neteaseLoginTitle" hidden>
      <div class="netease-login-backdrop" data-login-close></div>
      <section
        class="netease-login-panel glass-surface glass-surface--fallback"
        data-glass-surface
        data-glass-radius="20"
        data-glass-brightness="58"
        data-glass-opacity="0.92"
        data-glass-blur="14"
        data-glass-displace="0.38"
        data-glass-background-opacity="0.14"
        data-glass-saturation="1.18"
        data-glass-distortion-scale="-168"
        data-glass-red-offset="-4"
        data-glass-green-offset="20"
        data-glass-blue-offset="36"
      >
        <div class="glass-surface__content">
          <header class="login-panel-head">
            <div>
              <strong id="neteaseLoginTitle">缃戞槗浜戜簩缁寸爜鐧诲綍</strong>
              <span>浣跨敤缃戞槗浜戦煶涔?App 鎵爜纭</span>

            <button class="qr-refresh-button" id="neteaseQrRefresh" type="button">鍒锋柊浜岀淮鐮?/button>
          </div>
        </div>
      </section>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
